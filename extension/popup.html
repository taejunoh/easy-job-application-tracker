<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e2e8f0;
      font-size: 13px;
    }
    .header {
      padding: 12px 16px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #60a5fa;
    }
    .content { padding: 16px; }
    label {
      display: block;
      font-size: 10px;
      color: #64748b;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 6px 10px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 4px;
      color: #e2e8f0;
      font-size: 12px;
      margin-bottom: 10px;
      outline: none;
    }
    input:focus { border-color: #3b82f6; }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    button {
      padding: 6px 14px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-primary {
      background: #2563eb;
      color: white;
      flex: 1;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: #334155;
      color: #94a3b8;
    }
    .btn-secondary:hover { background: #475569; }
    .status {
      margin-top: 10px;
      font-size: 11px;
      padding: 8px;
      border-radius: 4px;
    }
    .status.success { background: #064e3b; color: #6ee7b7; }
    .status.error { background: #450a0a; color: #fca5a5; }
    .status.info { background: #172554; color: #93c5fd; }
    .settings {
      padding: 12px 16px;
      border-top: 1px solid #1e293b;
    }
    .settings label { margin-bottom: 2px; }
    .settings input {
      font-size: 11px;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>JobTracker</h1>
  </div>

  <div class="content">
    <div id="extracting" style="display:none">
      <div class="status info">Extracting job data from page...</div>
    </div>

    <div id="form" style="display:none">
      <label>Job Title</label>
      <input type="text" id="jobTitle" placeholder="Job title">

      <label>Company</label>
      <input type="text" id="company" placeholder="Company name">

      <label>Location</label>
      <input type="text" id="location" placeholder="Location (optional)">

      <input type="hidden" id="jobUrl">
      <textarea id="description" style="display:none"></textarea>

      <div class="actions">
        <button class="btn-primary" id="saveBtn">Save Application</button>
        <button class="btn-secondary" id="refreshBtn">Re-extract</button>
      </div>

      <div id="statusMsg" class="status" style="display:none"></div>
    </div>

    <div id="noPage" style="display:none">
      <div class="status info">
        Navigate to a job posting on LinkedIn, Indeed, or Glassdoor, then click this extension.
      </div>
    </div>
  </div>

  <div class="settings">
    <label>JobTracker URL</label>
    <div style="display: flex; gap: 6px; align-items: center;">
      <input type="text" id="serverUrl" placeholder="http://localhost:3001" value="http://localhost:3001" style="margin-bottom: 0; flex: 1;">
      <a id="openTracker" href="#" style="color: #60a5fa; font-size: 11px; white-space: nowrap; text-decoration: none;">Open</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
