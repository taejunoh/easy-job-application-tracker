<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e2e8f0;
      font-size: 13px;
    }
    .header {
      padding: 12px 16px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #60a5fa;
    }
    .content { padding: 16px; }
    label {
      display: block;
      font-size: 10px;
      color: #64748b;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 6px 10px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 4px;
      color: #e2e8f0;
      font-size: 12px;
      margin-bottom: 10px;
      outline: none;
    }
    input:focus { border-color: #3b82f6; }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    button {
      padding: 6px 14px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-primary {
      background: #2563eb;
      color: white;
      flex: 1;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: #334155;
      color: #94a3b8;
    }
    .btn-secondary:hover { background: #475569; }
    .status {
      margin-top: 10px;
      font-size: 11px;
      padding: 8px;
      border-radius: 4px;
    }
    .status.success { background: #064e3b; color: #6ee7b7; }
    .status.error { background: #450a0a; color: #fca5a5; }
    .status.info { background: #172554; color: #93c5fd; }
    /* Keyword Analysis */
    .analysis {
      margin-top: 10px;
      border: 1px solid #1e293b;
      border-radius: 6px;
      overflow: hidden;
    }
    .analysis-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      cursor: pointer;
      background: #111827;
    }
    .analysis-header:hover { background: #1a2332; }
    .analysis-title {
      font-size: 11px;
      font-weight: 600;
      color: #cbd5e1;
    }
    .analysis-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: 9999px;
    }
    .badge-green { background: rgba(34,197,94,0.15); color: #4ade80; }
    .badge-yellow { background: rgba(234,179,8,0.15); color: #facc15; }
    .badge-red { background: rgba(239,68,68,0.15); color: #f87171; }
    .analysis-body {
      padding: 8px 10px;
      border-top: 1px solid #1e293b;
    }
    .progress-bar {
      width: 100%;
      height: 5px;
      background: #334155;
      border-radius: 3px;
      margin-bottom: 6px;
    }
    .progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s;
    }
    .fill-green { background: #22c55e; }
    .fill-yellow { background: #eab308; }
    .fill-red { background: #ef4444; }
    .analysis-summary {
      font-size: 10px;
      color: #64748b;
      margin-bottom: 6px;
    }
    .keywords-section {
      margin-bottom: 6px;
    }
    .keywords-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .keywords-label.matched { color: #4ade80; }
    .keywords-label.missing { color: #f87171; }
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
    }
    .pill {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
    }
    .pill-green { background: rgba(34,197,94,0.12); color: #86efac; border: 1px solid rgba(34,197,94,0.2); }
    .pill-red { background: rgba(239,68,68,0.12); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); }
    .btn-analyze {
      width: 100%;
      margin-top: 10px;
      padding: 7px 0;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 4px;
      color: #94a3b8;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-analyze:hover { background: #334155; color: #e2e8f0; }
    .btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; }
    .analysis-prompt {
      font-size: 10px;
      color: #64748b;
      margin-top: 8px;
    }
    .analysis-prompt a { color: #60a5fa; text-decoration: none; }
    .analysis-prompt a:hover { text-decoration: underline; }
    .settings {
      padding: 12px 16px;
      border-top: 1px solid #1e293b;
    }
    .settings label { margin-bottom: 2px; }
    .settings input {
      font-size: 11px;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>JobTracker</h1>
  </div>

  <div class="content">
    <div id="extracting" style="display:none">
      <div class="status info">Extracting job data from page...</div>
    </div>

    <div id="form" style="display:none">
      <label>Job Title</label>
      <input type="text" id="jobTitle" placeholder="Job title">

      <label>Company</label>
      <input type="text" id="company" placeholder="Company name">

      <label>Location</label>
      <input type="text" id="location" placeholder="Location (optional)">

      <input type="hidden" id="jobUrl">
      <input type="hidden" id="salary">
      <input type="hidden" id="jobType">
      <textarea id="description" style="display:none"></textarea>

      <div class="actions">
        <button class="btn-primary" id="saveBtn">Save Application</button>
        <button class="btn-secondary" id="refreshBtn">Re-extract</button>
        <button class="btn-secondary" id="fillProfilesBtn" title="Auto-fill LinkedIn & GitHub on application forms">Fill Profiles</button>
      </div>

      <button class="btn-analyze" id="analyzeBtn" style="display:none">Analyze Keywords</button>

      <div id="analysisSection" style="display:none">
        <div class="analysis">
          <div class="analysis-header" id="analysisToggle">
            <span class="analysis-title">Keyword Match</span>
            <span class="analysis-badge" id="analysisBadge">0%</span>
          </div>
          <div class="analysis-body" id="analysisBody">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="analysis-summary" id="analysisSummary"></div>
            <div class="keywords-section" id="matchedSection" style="display:none">
              <div class="keywords-label matched">Matched</div>
              <div class="pills" id="matchedPills"></div>
            </div>
            <div class="keywords-section" id="missingSection" style="display:none">
              <div class="keywords-label missing">Missing</div>
              <div class="pills" id="missingPills"></div>
            </div>
          </div>
        </div>
      </div>
      <div id="analysisPrompt" class="analysis-prompt" style="display:none"></div>

      <div id="statusMsg" class="status" style="display:none"></div>
    </div>

    <div id="noPage" style="display:none">
      <div class="status info">
        Navigate to a job posting on LinkedIn, Indeed, or Glassdoor, then click this extension.
      </div>
    </div>
  </div>

  <div class="settings">
    <label>JobTracker URL</label>
    <div style="display: flex; gap: 6px; align-items: center;">
      <input type="text" id="serverUrl" placeholder="https://easy-job-application-tracker.vercel.app" value="https://easy-job-application-tracker.vercel.app" style="margin-bottom: 0; flex: 1;">
      <a id="openTracker" href="#" style="color: #60a5fa; font-size: 11px; white-space: nowrap; text-decoration: none;">Open</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
